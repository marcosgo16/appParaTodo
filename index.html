      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #F5F0E8; -webkit-tap-highlight-color: transparent; }
    </style>
    <!-- Soporte SPA en GitHub Pages: 404.html redirige y aquí reconstruimos la ruta -->
    <script>
      (function () {
        var l = window.location;
        var BASE = "/appParaTodo/"; // inyectado por Vite, ej "/appParaTodo/"
        var baseNoSlash = BASE.replace(/\/$/, "");
        // 404.html redirige a "<BASE>/?p=<ruta>&q=<query>&h=<hash>"
        var params = new URLSearchParams(l.search);
        var p = params.get("p");
        if (!p) return;
        var q = params.get("q") || "";
        var h = params.get("h") || "";
        // Limpia la URL para que BrowserRouter vea la ruta real.
        var newUrl = l.origin + baseNoSlash + p + (q ? "?" + q : "") + (h ? "#" + h : "");
        window.history.replaceState(null, "", newUrl);
      })();
    </script>
    <script type="module" crossorigin src="/appParaTodo/assets/index-CAnhw9pG.js"></script>
  </head>
